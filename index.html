<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 트렌드 수집기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #FFF0F5;
            --text: #333333;
            --border: #FFD6E8;
            --card-bg: #FFFBFC;
            --accent: #FF69B4;
        }

        [data-theme="dark"] {
            --bg: #2A1F2E;
            --text: #ffffff;
            --border: #5D3A4A;
            --card-bg: #3D2A3E;
            --accent: #FF69B4;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.3s, color 0.3s;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        h1 {
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background-color: var(--accent);
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.8;
        }

        .theme-toggle {
            background-color: var(--border);
            color: var(--text);
            width: 50px;
            padding: 8px;
            border-radius: 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            padding: 20px;
            background-color: var(--card-bg);
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
        }

        input, select {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 5px;
            background-color: var(--bg);
            color: var(--text);
            font-size: 14px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button.secondary {
            background-color: var(--border);
            color: var(--text);
        }

        .status {
            padding: 10px 15px;
            background-color: var(--card-bg);
            border-radius: 5px;
            font-size: 13px;
            border-left: 4px solid var(--accent);
        }

        .loading {
            text-align: center;
            padding: 30px;
        }

        .spinner {
            border: 4px solid var(--border);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .video-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .thumbnail {
            width: 100%;
            height: 160px;
            object-fit: cover;
            position: relative;
        }

        .favorite-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s;
        }

        .favorite-btn:hover {
            background-color: rgba(255, 0, 0, 0.9);
        }

        .video-info {
            padding: 15px;
        }

        .video-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-meta {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        .video-stats {
            display: flex;
            gap: 10px;
            font-size: 12px;
            color: var(--text);
            margin-top: 8px;
        }

        .stat {
            flex: 1;
        }

        .error {
            background-color: #ffebee;
            border: 1px solid #ff5252;
            color: #c62828;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        [data-theme="dark"] .error {
            background-color: #3e2723;
            border: 1px solid #ff5252;
            color: #ff8a80;
        }

        .empty {
            text-align: center;
            padding: 50px 20px;
            color: #999;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }

        .stat-label {
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
        }

        .top-ten {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .top-ten h3 {
            margin-bottom: 15px;
            font-size: 18px;
        }

        .top-ten-list {
            list-style: none;
        }

        .top-ten-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .top-ten-item:last-child {
            border-bottom: none;
        }

        .top-ten-item:hover {
            background-color: var(--bg);
        }

        .rank {
            font-weight: 700;
            color: var(--accent);
            font-size: 18px;
            min-width: 30px;
        }

        .top-ten-title {
            flex: 1;
            font-size: 13px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .top-ten-views {
            font-weight: 600;
            color: var(--text);
            min-width: 80px;
            text-align: right;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg);
            border-radius: 10px;
            max-width: 900px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 20px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: var(--accent);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            opacity: 0.8;
        }

        .video-player {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .video-details {
            margin-top: 20px;
        }

        .video-details h2 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .video-details p {
            font-size: 14px;
            color: #999;
            margin-bottom: 8px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .modal-buttons button {
            flex: 1;
        }

        .chart-section {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .chart-section h3 {
            margin-bottom: 20px;
            font-size: 18px;
        }

        .chart-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .chart {
            flex: 1;
            min-width: 300px;
        }

        .chart-title {
            font-size: 14px;
            color: #999;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            height: 200px;
            justify-content: space-around;
            padding: 10px 0;
        }

        .bar-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            gap: 5px;
        }

        .bar {
            background: linear-gradient(180deg, var(--accent), rgba(255, 0, 0, 0.6));
            border-radius: 4px 4px 0 0;
            width: 100%;
            min-height: 4px;
            transition: opacity 0.3s;
        }

        .bar:hover {
            opacity: 0.8;
        }

        .bar-label {
            font-size: 12px;
            color: #999;
            text-align: center;
            width: 100%;
            word-break: break-word;
        }

        .bar-value {
            font-size: 11px;
            color: var(--text);
            font-weight: 600;
            margin-top: 3px;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
            }

            .header-controls {
                width: 100%;
                justify-content: space-between;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📺 YouTube 트렌드</h1>
            <div class="header-controls">
                <button class="theme-toggle" id="themeToggle">🌙</button>
                <button onclick="exportData()" class="secondary">내보내기</button>
            </div>
        </header>

        <div id="error" class="error" style="display: none;"></div>

        <div class="controls">
            <div class="control-group">
                <label for="apiKey">YouTube API 키</label>
                <input type="password" id="apiKey" placeholder="API 키 입력">
            </div>

            <div class="control-group">
                <label for="searchKeyword">키워드 검색</label>
                <input type="text" id="searchKeyword" placeholder="검색어 입력 (예: 한국 음악)">
            </div>

            <div class="control-group">
                <label for="country">국가</label>
                <select id="country">
                    <option value="KR">🇰🇷 한국</option>
                    <option value="US">🇺🇸 미국</option>
                    <option value="JP">🇯🇵 일본</option>
                    <option value="CN">🇨🇳 중국</option>
                    <option value="IN">🇮🇳 인도</option>
                    <option value="BR">🇧🇷 브라질</option>
                    <option value="MX">🇲🇽 멕시코</option>
                    <option value="GB">🇬🇧 영국</option>
                    <option value="DE">🇩🇪 독일</option>
                    <option value="FR">🇫🇷 프랑스</option>
                    <option value="">🌍 전체</option>
                </select>
            </div>

            <div class="control-group">
                <label for="category">카테고리</label>
                <select id="category">
                    <option value="">전체</option>
                    <option value="10">음악</option>
                    <option value="20">영화</option>
                    <option value="23">애니메이션</option>
                    <option value="24">스포츠</option>
                    <option value="25">쇼/드라마</option>
                    <option value="26">단편영상</option>
                    <option value="27">트래블/이벤트</option>
                    <option value="28">게이밍</option>
                </select>
            </div>

            <div class="control-group">
                <label for="sortBy">정렬</label>
                <select id="sortBy">
                    <option value="viewCount">조회수</option>
                    <option value="likes">좋아요</option>
                    <option value="publishedAt">최신순</option>
                    <option value="relevance">관련성</option>
                </select>
            </div>

            <div class="action-buttons" style="grid-column: 1 / -1;">
                <button onclick="fetchTrends()">🔄 조회</button>
            </div>
        </div>

        <div id="status" class="status" style="display: none;"></div>
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>로딩 중...</p>
        </div>

        <div id="dashboardContainer" style="display: none;">
            <div class="dashboard" id="dashboard"></div>

            <div class="chart-section">
                <h3>📊 조회수 분포</h3>
                <div class="chart-container">
                    <div class="chart">
                        <div class="chart-title">조회수 범위별 영상 수</div>
                        <div class="bar-chart" id="viewDistributionChart"></div>
                    </div>
                    <div class="chart">
                        <div class="chart-title">채널별 영상 수 (상위 5)</div>
                        <div class="bar-chart" id="channelChart"></div>
                    </div>
                </div>
            </div>

            <div class="top-ten">
                <h3>🔥 조회수 TOP 10</h3>
                <ul class="top-ten-list" id="topTenList"></ul>
            </div>
        </div>

        <div id="videoContainer" class="video-grid"></div>
        <div id="empty" class="empty" style="display: none;">아직 조회된 트렌드가 없습니다.</div>
    </div>

    <div id="videoModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeVideoModal()">✕</button>
            <iframe id="videoPlayer" class="video-player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            <div class="video-details">
                <h2 id="modalTitle"></h2>
                <p id="modalChannel"></p>
                <p id="modalStats"></p>
                <div class="modal-buttons">
                    <button onclick="openYouTubeTab()">📺 유튜브에서 보기</button>
                    <button class="secondary" onclick="closeVideoModal()">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY_STORAGE = 'yt_api_key';
        const FAVORITES_STORAGE = 'yt_favorites';
        const LAST_UPDATE_STORAGE = 'yt_last_update';
        const VIDEOS_STORAGE = 'yt_videos';

        let currentVideos = [];
        let favorites = new Set(JSON.parse(localStorage.getItem(FAVORITES_STORAGE) || '[]'));

        // 테마 토글
        function initTheme() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
            updateThemeButton();
        }

        function updateThemeButton() {
            const theme = document.documentElement.getAttribute('data-theme');
            document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        document.getElementById('themeToggle').addEventListener('click', () => {
            const theme = document.documentElement.getAttribute('data-theme');
            const newTheme = theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeButton();
        });

        // 저장된 API 키 로드
        function loadApiKey() {
            const saved = localStorage.getItem(API_KEY_STORAGE);
            if (saved) {
                document.getElementById('apiKey').value = saved;
            }
        }

        // API 키 저장
        document.getElementById('apiKey').addEventListener('change', () => {
            const key = document.getElementById('apiKey').value;
            if (key) {
                localStorage.setItem(API_KEY_STORAGE, key);
            }
        });

        // 에러 표시
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function clearError() {
            document.getElementById('error').style.display = 'none';
        }

        // 상태 업데이트
        function updateStatus(message) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.style.display = 'block';
        }

        // 조회수 포맷팅 (한국어)
        function formatNumber(num) {
            if (num >= 100000000) {
                // 억 이상: 3억2천5백만회
                const eok = Math.floor(num / 100000000);
                let remainder = num % 100000000;

                if (remainder === 0) {
                    return eok + '억회';
                }

                let result = eok + '억';

                // 천만 단위
                if (remainder >= 10000000) {
                    const cheonman = Math.floor(remainder / 10000000);
                    result += cheonman + '천';
                    remainder = remainder % 10000000;
                }

                // 백만 단위
                if (remainder >= 1000000) {
                    const baekman = Math.floor(remainder / 1000000);
                    result += baekman + '백';
                    remainder = remainder % 1000000;
                }

                // 만 단위
                if (remainder >= 10000) {
                    const man = Math.floor(remainder / 10000);
                    result += man + '만';
                }

                result += '회';
                return result;
            } else if (num >= 10000000) {
                // 천만 이상: 8천3백만회
                const cheon = Math.floor(num / 10000000);
                const baekman = Math.floor((num % 10000000) / 1000000);
                if (baekman > 0) {
                    return cheon + '천' + baekman + '백만회';
                } else {
                    return cheon + '천만회';
                }
            } else if (num >= 1000000) {
                // 백만 이상: 5백만회 또는 1백만2만회 등
                const baekman = Math.floor(num / 1000000);
                const man = Math.floor((num % 1000000) / 10000);
                if (man > 0) {
                    return baekman + '백만' + man + '만회';
                } else {
                    return baekman + '백만회';
                }
            } else if (num >= 10000) {
                // 만 이상: 12만5천회
                const man = Math.floor(num / 10000);
                const cheon = Math.floor((num % 10000) / 1000);
                if (cheon > 0) {
                    return man + '만' + cheon + '천회';
                } else {
                    return man + '만회';
                }
            } else if (num >= 1000) {
                // 천 이상: 1.2천회
                return (num / 1000).toFixed(1) + '천회';
            }
            return num + '회';
        }

        // 유튜브 트렌드/검색 조회
        async function fetchTrends() {
            clearError();
            const apiKey = document.getElementById('apiKey').value.trim();

            if (!apiKey) {
                showError('YouTube API 키를 입력해주세요.');
                return;
            }

            const keyword = document.getElementById('searchKeyword').value.trim();
            const country = document.getElementById('country').value;
            const category = document.getElementById('category').value;
            const sortBy = document.getElementById('sortBy').value;
            const loading = document.getElementById('loading');
            loading.style.display = 'block';

            try {
                let url;
                let params = `key=${apiKey}&maxResults=50&part=snippet`;

                if (keyword) {
                    // 검색 모드
                    url = `https://www.googleapis.com/youtube/v3/search?${params}&q=${encodeURIComponent(keyword)}&type=video&order=${sortBy === 'relevance' ? 'relevance' : 'viewCount'}`;
                    if (country) {
                        url += `&regionCode=${country}`;
                    }
                    const response = await fetch(url);
                    if (!response.ok) throw new Error('API 호출 실패: ' + response.status);
                    const data = await response.json();
                    if (data.error) throw new Error('API 오류: ' + data.error.message);

                    const videoIds = data.items.map(item => item.id.videoId).join(',');
                    const statsUrl = `https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${videoIds}&key=${apiKey}`;
                    const statsResponse = await fetch(statsUrl);
                    const statsData = await statsResponse.json();

                    const statsMap = {};
                    statsData.items.forEach(item => {
                        statsMap[item.id] = item.statistics;
                    });

                    currentVideos = data.items.map(item => ({
                        id: item.id.videoId,
                        title: item.snippet.title,
                        thumbnail: item.snippet.thumbnails.medium.url,
                        channelTitle: item.snippet.channelTitle,
                        viewCount: parseInt(statsMap[item.id.videoId]?.viewCount || 0),
                        likeCount: parseInt(statsMap[item.id.videoId]?.likeCount || 0),
                        publishedAt: new Date(item.snippet.publishedAt)
                    }));
                } else {
                    // 트렌드 모드
                    const regionCode = country || 'KR';
                    url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&chart=mostPopular&regionCode=${regionCode}&maxResults=50&key=${apiKey}`;
                    if (category) {
                        url += `&videoCategoryId=${category}`;
                    }

                    const response = await fetch(url);
                    if (!response.ok) throw new Error('API 호출 실패: ' + response.status);
                    const data = await response.json();
                    if (data.error) throw new Error('API 오류: ' + data.error.message);

                    currentVideos = data.items.map(item => ({
                        id: item.id,
                        title: item.snippet.title,
                        thumbnail: item.snippet.thumbnails.medium.url,
                        channelTitle: item.snippet.channelTitle,
                        viewCount: parseInt(item.statistics.viewCount || 0),
                        likeCount: parseInt(item.statistics.likeCount || 0),
                        publishedAt: new Date(item.snippet.publishedAt)
                    }));
                }

                // 정렬
                sortVideos(sortBy);

                // 저장
                localStorage.setItem(VIDEOS_STORAGE, JSON.stringify(currentVideos));
                localStorage.setItem(LAST_UPDATE_STORAGE, new Date().toLocaleString('ko-KR'));

                renderDashboard();
                renderVideos();
                updateStatus(`✅ ${currentVideos.length}개 영상 조회됨 (${new Date().toLocaleTimeString('ko-KR')})`);
            } catch (error) {
                showError('오류: ' + error.message);
                loadSavedVideos();
            } finally {
                loading.style.display = 'none';
            }
        }

        // 영상 정렬
        function sortVideos(sortBy) {
            if (sortBy === 'relevance') {
                // 검색 결과의 관련성 순서 유지 (API 기본값)
                return;
            }
            currentVideos.sort((a, b) => {
                if (sortBy === 'viewCount') return b.viewCount - a.viewCount;
                if (sortBy === 'likes') return b.likeCount - a.likeCount;
                if (sortBy === 'publishedAt') return b.publishedAt - a.publishedAt;
            });
        }

        // 정렬 변경 이벤트
        document.getElementById('sortBy').addEventListener('change', (e) => {
            if (currentVideos.length > 0) {
                sortVideos(e.target.value);
                renderDashboard();
                renderVideos();
            }
        });

        // 검색어 입력 시 엔터 키로 조회
        document.getElementById('searchKeyword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                fetchTrends();
            }
        });

        // 대시보드 통계
        function calculateStats() {
            if (currentVideos.length === 0) {
                return {
                    total: 0,
                    totalViews: 0,
                    avgViews: 0,
                    topTen: []
                };
            }

            const totalViews = currentVideos.reduce((sum, v) => sum + v.viewCount, 0);
            const avgViews = Math.round(totalViews / currentVideos.length);
            const topTen = currentVideos.slice(0, 10);

            return {
                total: currentVideos.length,
                totalViews: totalViews,
                avgViews: avgViews,
                topTen: topTen
            };
        }

        // 조회수 분포 차트 데이터
        function getViewDistribution() {
            const ranges = [
                { label: '1천만+', min: 10000000, max: Infinity },
                { label: '1~10백만', min: 1000000, max: 9999999 },
                { label: '10~100만', min: 100000, max: 999999 },
                { label: '1~10만', min: 10000, max: 99999 },
                { label: '1만 이하', min: 0, max: 9999 }
            ];

            return ranges.map(range => ({
                label: range.label,
                count: currentVideos.filter(v => v.viewCount >= range.min && v.viewCount <= range.max).length
            }));
        }

        // 채널별 영상 수 (상위 5)
        function getTopChannels() {
            const channelMap = {};
            currentVideos.forEach(video => {
                channelMap[video.channelTitle] = (channelMap[video.channelTitle] || 0) + 1;
            });

            return Object.entries(channelMap)
                .map(([name, count]) => ({ name, count }))
                .sort((a, b) => b.count - a.count)
                .slice(0, 5);
        }

        // 막대 차트 렌더링
        function renderBarChart(data, containerId, isChannel = false) {
            const container = document.getElementById(containerId);
            const maxValue = Math.max(...data.map(d => d.count || d.value || 0), 1);

            container.innerHTML = data.map(item => {
                const value = item.count || item.value || 0;
                const height = (value / maxValue) * 100;
                const label = isChannel ? item.name : item.label;

                return `
                    <div class="bar-group">
                        <div class="bar" style="height: ${height}%; min-height: ${value > 0 ? '20px' : '4px'}" title="${label}: ${value}"></div>
                        <div class="bar-label">${label}</div>
                        <div class="bar-value">${value}</div>
                    </div>
                `;
            }).join('');
        }

        // 대시보드 렌더링
        function renderDashboard() {
            const stats = calculateStats();
            const dashboard = document.getElementById('dashboard');
            const dashboardContainer = document.getElementById('dashboardContainer');

            if (currentVideos.length === 0) {
                dashboardContainer.style.display = 'none';
                return;
            }

            dashboardContainer.style.display = 'block';
            dashboard.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">수집된 영상</div>
                    <div class="stat-value">${stats.total}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">총 조회수</div>
                    <div class="stat-value">${formatNumber(stats.totalViews)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">평균 조회수</div>
                    <div class="stat-value">${formatNumber(stats.avgViews)}</div>
                </div>
            `;

            // 차트 렌더링
            renderBarChart(getViewDistribution(), 'viewDistributionChart');
            renderBarChart(getTopChannels(), 'channelChart', true);

            const topTenList = document.getElementById('topTenList');
            topTenList.innerHTML = stats.topTen.map((video, index) => `
                <li class="top-ten-item" onclick="playVideo('${video.id}')">
                    <div class="rank">#${index + 1}</div>
                    <div class="top-ten-title">${video.title}</div>
                    <div class="top-ten-views">${formatNumber(video.viewCount)}</div>
                </li>
            `).join('');
        }

        // 영상 렌더링
        function renderVideos() {
            const container = document.getElementById('videoContainer');
            const empty = document.getElementById('empty');

            if (currentVideos.length === 0) {
                container.innerHTML = '';
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            container.innerHTML = currentVideos.map(video => `
                <div class="video-card" onclick="playVideo('${video.id}')">
                    <div style="position: relative;">
                        <img src="${video.thumbnail}" alt="${video.title}" class="thumbnail">
                        <button class="favorite-btn" onclick="event.stopPropagation(); toggleFavorite('${video.id}')" title="즐겨찾기">
                            ${favorites.has(video.id) ? '❤️' : '🤍'}
                        </button>
                    </div>
                    <div class="video-info">
                        <div class="video-title">
                            ${video.title}
                        </div>
                        <div class="video-meta">${video.channelTitle}</div>
                        <div class="video-stats">
                            <div class="stat">👁️ ${formatNumber(video.viewCount)}</div>
                            <div class="stat">❤️ ${formatNumber(video.likeCount)}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 비디오 재생 (바로 유튜브로 이동)
        function playVideo(videoId) {
            window.open(`https://www.youtube.com/watch?v=${videoId}`, '_blank');
        }

        // 모달 닫기
        function closeVideoModal() {
            document.getElementById('videoModal').classList.remove('active');
            document.getElementById('videoPlayer').src = '';
        }

        // 유튜브에서 열기 (새 탭)
        function openYouTubeTab() {
            window.open(`https://www.youtube.com/watch?v=${currentVideoId}`, '_blank');
        }

        // 모달 배경 클릭 시 닫기
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('videoModal').addEventListener('click', (e) => {
                if (e.target.id === 'videoModal') {
                    closeVideoModal();
                }
            });

            // ESC 키로 닫기
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeVideoModal();
                }
            });
        });

        // 즐겨찾기 토글
        function toggleFavorite(videoId) {
            if (favorites.has(videoId)) {
                favorites.delete(videoId);
            } else {
                favorites.add(videoId);
            }
            localStorage.setItem(FAVORITES_STORAGE, JSON.stringify([...favorites]));
            renderVideos();
        }

        // 즐겨찾기 초기화
        function clearFavorites() {
            if (confirm('모든 즐겨찾기를 초기화하시겠습니까?')) {
                favorites.clear();
                localStorage.setItem(FAVORITES_STORAGE, '[]');
                renderVideos();
            }
        }

        // 데이터 내보내기
        function exportData() {
            if (currentVideos.length === 0) {
                alert('내보낼 데이터가 없습니다.');
                return;
            }

            const dataStr = JSON.stringify(currentVideos, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `youtube_trends_${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
        }

        // 저장된 영상 로드
        function loadSavedVideos() {
            const saved = localStorage.getItem(VIDEOS_STORAGE);
            if (saved) {
                currentVideos = JSON.parse(saved);
                currentVideos.forEach(v => {
                    v.publishedAt = new Date(v.publishedAt);
                });
                renderDashboard();
                renderVideos();
                const lastUpdate = localStorage.getItem(LAST_UPDATE_STORAGE);
                updateStatus(`📦 저장된 데이터 (마지막 업데이트: ${lastUpdate})`);
            }
        }


        // 초기화
        initTheme();
        loadApiKey();
        loadSavedVideos();
    </script>
</body>
</html>
